<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Nestfigure</title>
  <!-- Icon: nest bowl + rising bars -->
  <g transform="translate(2, 4)">
    <!-- Outer nest bowl -->
    <path
      d="M4 28c0 0 6 10 20 10s20-10 20-10"
      stroke="#3e79ea"
      stroke-width="3.2"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M8 26c0 0 5 7 16 7s16-7 16-7"
      stroke="#3e79ea"
      stroke-width="2.4"
      stroke-linecap="round"
      fill="none"
      opacity="0.55"
    />
    <!-- Growth bars -->
    <rect x="12" y="20" width="4.5" height="8" rx="1.2" fill="#3e79ea"/>
    <rect x="18.5" y="15" width="4.5" height="13" rx="1.2" fill="#3e79ea"/>
    <rect x="25" y="9" width="4.5" height="19" rx="1.2" fill="#3e79ea"/>
    <!-- Arrow -->
    <path d="M33.5 14V6.5M33.5 6.5L30.5 9.5M33.5 6.5L36.5 9.5" stroke="#3e79ea" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Soft mint accent dot -->
    <circle cx="33.5" cy="4" r="1.6" fill="#89ecb0"/>
  </g>
  <!-- Wordmark -->
  <text
    x="56"
    y="32"
    font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="-0.03em"
  >
    <tspan fill="#272c30">Nest</tspan><tspan fill="#3e79ea">figure</tspan>
  </text>
</svg>
